name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches all git history. Required by the launch-gate
          # test below — but NOT sufficient on its own because actions/checkout@v4
          # checks out a detached PR-merge ref without creating a local `main`
          # branch. The next step creates the local main ref explicitly.
          fetch-depth: 0

      - name: Create local main ref (for merge-base test)
        # tests/v1.8-phase58-launch-gate-untouched.spec.ts calls
        # `git merge-base HEAD main` which needs a LOCAL `main` ref.
        # actions/checkout@v4 fetches history but leaves main as origin/main only.
        # This step creates the local main ref pointing to origin/main.
        run: git fetch origin main:main || git fetch origin main:refs/heads/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          CI: true

      # Phase 64 PR #4 Path N bootstrap: upload Playwright snapshot directories
      # after the test run (whether pass or fail) so chromium-linux baselines
      # written-on-first-run can be retrieved and committed. Once Linux baselines
      # are committed, this step is no longer required for that purpose but is
      # kept for future cross-platform baseline generation.
      - name: Upload Playwright snapshots (bootstrap)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots-${{ github.run_id }}
          path: |
            tests/**/*-snapshots/**
            test-results/**
          retention-days: 7
          if-no-files-found: ignore
