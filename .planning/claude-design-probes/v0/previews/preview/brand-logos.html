<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:16px">LOGO SYSTEM · MARK · WORDMARK · CD SYMBOL</div>
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center">
    <div style="color:var(--color-foreground)"><img src="../assets/logo-sf-mark.svg" width="72" height="36" alt="SF mark"></div>
    <div style="color:var(--color-foreground)"><img src="../assets/logo-sf-wordmark.svg" width="360" alt="SIGNALFRAME//UX"></div>
    <div style="color:var(--color-foreground)"><img src="../assets/cd-symbol.svg" width="42" height="42" alt="Culture Division"></div>
  </div>
  <hr class="hr-element" style="margin-top:18px">
  <div class="mono" style="font-size:10px;color:var(--color-muted-foreground)">SIGNALFRAME//UX — the `//` divider is the fingerprint. Magenta slash = signal. Foreground slash = frame.</div>
</div></body></html>
