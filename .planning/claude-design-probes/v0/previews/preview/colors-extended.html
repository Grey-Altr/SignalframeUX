<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">

      <div style="height:70px;background:oklch(0.550 0.180 25)"></div>

      <div style="height:70px;background:oklch(0.205 0 0)"></div>

    </div>

      <div style="height:70px;background:oklch(0.460 0.010 298)"></div>
