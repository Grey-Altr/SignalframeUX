<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">THEME HUE · --sfx-theme-hue</div>
  <div class="row" style="gap:0">
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 350)"></div>
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 25)"></div>
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 98);"></div>
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 145)"></div>
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 200)"></div>
    <div style="flex:1;height:90px;background:oklch(0.65 0.3 270)"></div>
  </div>
  <div class="row" style="gap:0;margin-top:4px">
    <div style="flex:1" class="label">350 · MAGENTA</div>
    <div style="flex:1" class="label">025 · RED</div>
    <div style="flex:1" class="label">098 · YELLOW</div>
    <div style="flex:1" class="label">145 · GREEN</div>
    <div style="flex:1" class="label">200 · CYAN</div>
    <div style="flex:1" class="label">270 · PURPLE</div>
  </div>
  <div class="mono" style="font-size:10px;margin-top:10px;color:var(--color-muted-foreground)">
    Re-theme the system by overriding one token: <span style="color:var(--color-foreground)">:root { --sfx-theme-hue: 200; }</span>
  </div>
</div></body></html>
