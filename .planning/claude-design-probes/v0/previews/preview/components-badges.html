<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">SFBADGE · SFSTATUSDOT · CHIPS</div>
  <div class="row" style="gap:10px">
    <span class="chip">STABLE</span>
    <span class="chip" style="background:oklch(0.65 0.3 350);color:oklch(0.985 0 0);border-color:oklch(0.65 0.3 350)">ARMED</span>
    <span class="chip" style="background:var(--color-foreground);color:var(--color-background);border-color:var(--color-foreground)">INGESTING</span>
    <span class="chip" style="color:oklch(0.550 0.180 25);border-color:oklch(0.550 0.180 25)">DRIFT</span>
  </div>
  <hr class="hr-element">
  <div class="row" style="gap:18px;align-items:center;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.12em">
    <span style="display:inline-flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:oklch(0.85 0.25 145);display:inline-block"></span>ONLINE</span>
    <span style="display:inline-flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:oklch(0.91 0.18 98);display:inline-block"></span>WAIT</span>
    <span style="display:inline-flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:oklch(0.550 0.180 25);display:inline-block"></span>ERROR</span>
    <span style="display:inline-flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:oklch(0.460 0.010 298);display:inline-block"></span>OFFLINE</span>
  </div>
</div></body></html>
