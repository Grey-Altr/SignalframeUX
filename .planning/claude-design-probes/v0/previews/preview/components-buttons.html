<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
         border: 2px solid var(--color-foreground); padding: 10px 22px; font-size: 12px; cursor: pointer; transition: all 100ms cubic-bezier(0.2,0,0,1); }
  .btn.primary { background: oklch(0.65 0.3 350); color: oklch(0.985 0 0); }
  .btn.primary:hover { background: var(--color-foreground); color: var(--color-background); }
  .btn.ghost { background: transparent; color: var(--color-foreground); }
  .btn.ghost:hover { border-width: 3px; padding: 9px 21px; }
  .btn.signal { background: var(--color-foreground); color: var(--color-background); border-color: oklch(0.65 0.3 350); }
  .btn.signal:hover { background: oklch(0.65 0.3 350); border-color: oklch(0.65 0.3 350); }
</style></head>
<body><div class="card">
  <div class="label" style="margin-bottom:14px">SFBUTTON · PRIMARY · GHOST · SIGNAL</div>
  <div class="row">
    <button class="btn primary">LAUNCH</button>
    <button class="btn ghost">REFUSE</button>
    <button class="btn signal">INGEST SIGNAL</button>
  </div>
  <div class="mono" style="font-size:10px;margin-top:14px;color:var(--color-muted-foreground)">font-mono · uppercase · 2px border · asymmetric timing (100ms in / 400ms out) · no radius</div>
</div></body></html>
