<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">SFCARD · 2PX BORDER · NO SHADOW · NO RADIUS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="border:2px solid var(--color-foreground);background:var(--color-background);padding:14px">
      <div class="mono" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700">PROJECT · R08</div>
      <div style="font-size:11px;color:var(--color-muted-foreground);margin-top:4px;letter-spacing:0.02em">Updated 2 days ago</div>
      <hr class="hr-element" style="margin:12px 0">
      <div class="display" style="font-size:36px">CATALOG</div>
      <div style="font-size:11px;color:var(--color-muted-foreground);margin-top:8px">Detroit Underground reissue package, 2008–10.</div>
    </div>
    <div style="border:2px solid oklch(0.65 0.3 350);background:var(--color-background);padding:14px">
      <div class="mono" style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;color:oklch(0.65 0.3 350)">SIGNAL · ARMED</div>
      <div style="font-size:11px;color:var(--color-muted-foreground);margin-top:4px">hue:350 · seed:0x7F1A</div>
      <hr class="hr-element" style="margin:12px 0;border-color:oklch(0.65 0.3 350)">
      <div class="display" style="font-size:36px;color:oklch(0.65 0.3 350)">INGEST</div>
      <div style="font-size:11px;color:var(--color-muted-foreground);margin-top:8px">Hover state — border shifts to primary in 100ms.</div>
    </div>
  </div>
</div></body></html>
