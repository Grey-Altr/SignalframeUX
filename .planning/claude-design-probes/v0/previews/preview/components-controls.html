<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">SFSLIDER · SFSWITCH · SIGNAL CONTROLS</div>
  <div class="label" style="font-size:9px">--signal-intensity · 0.50</div>
  <div style="margin:8px 0 20px;position:relative;height:2px;background:var(--color-border)">
    <div style="position:absolute;left:0;top:0;height:2px;width:50%;background:oklch(0.65 0.3 350)"></div>
    <div style="position:absolute;left:calc(50% - 6px);top:-5px;width:12px;height:12px;background:var(--color-foreground)"></div>
  </div>
  <div class="label" style="font-size:9px">--signal-speed · 1.0x</div>
  <div style="margin:8px 0 20px;position:relative;height:2px;background:var(--color-border)">
    <div style="position:absolute;left:0;top:0;height:2px;width:33%;background:oklch(0.65 0.3 350)"></div>
    <div style="position:absolute;left:calc(33% - 6px);top:-5px;width:12px;height:12px;background:var(--color-foreground)"></div>
  </div>
  <div style="display:flex;gap:18px;align-items:center">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:32px;height:16px;background:oklch(0.65 0.3 350);position:relative">
        <div style="position:absolute;right:2px;top:2px;width:12px;height:12px;background:oklch(0.985 0 0)"></div>
      </div>
      <span class="label">VHS OVERLAY</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:32px;height:16px;background:var(--color-border);position:relative">
        <div style="position:absolute;left:2px;top:2px;width:12px;height:12px;background:oklch(0.985 0 0)"></div>
      </div>
      <span class="label">REDUCED MOTION</span>
    </div>
  </div>
</div></body></html>
