<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">SFINPUT · SFLABEL · FOCUS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <div class="label">CATALOG ID</div>
      <input style="margin-top:6px;width:100%;padding:9px 10px;border:2px solid var(--color-foreground);background:var(--color-background);font-family:var(--font-mono);font-size:12px;outline:none" value="R08 · 2008-10"/>
    </div>
    <div>
      <div class="label">SIGNAL HUE</div>
      <input style="margin-top:6px;width:100%;padding:9px 10px;border:2px solid oklch(0.65 0.3 350);background:var(--color-background);font-family:var(--font-mono);font-size:12px;outline:none;box-shadow:0 0 0 2px oklch(0.65 0.3 350 / 0.2)" value="350"/>
    </div>
    <div>
      <div class="label">MANIFEST</div>
      <textarea rows="2" style="margin-top:6px;width:100%;padding:9px 10px;border:2px solid var(--color-foreground);background:var(--color-background);font-family:var(--font-sans);font-size:12px;outline:none;resize:none">Ingest signal. Preserve frame.</textarea>
    </div>
    <div>
      <div class="label">STATE · ERROR</div>
      <input style="margin-top:6px;width:100%;padding:9px 10px;border:2px solid oklch(0.550 0.180 25);background:var(--color-background);font-family:var(--font-mono);font-size:12px;outline:none" value="invalid seed"/>
    </div>
  </div>
</div></body></html>
