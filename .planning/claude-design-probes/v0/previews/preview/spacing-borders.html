<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:12px">BORDERS · THREE WEIGHTS · ZERO RADIUS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
    <div style="border:2px solid var(--color-foreground);padding:16px">
      <div class="mono" style="font-size:18px;font-weight:700">2PX</div>
      <div class="label" style="margin-top:4px">ELEMENT</div>
    </div>
    <div style="border:3px solid var(--color-foreground);padding:16px">
      <div class="mono" style="font-size:18px;font-weight:700">3PX</div>
      <div class="label" style="margin-top:4px">DIVIDER</div>
    </div>
    <div style="border:4px solid var(--color-foreground);padding:16px">
      <div class="mono" style="font-size:18px;font-weight:700">4PX</div>
      <div class="label" style="margin-top:4px">SECTION</div>
    </div>
  </div>
  <div class="mono" style="font-size:10px;margin-top:10px;color:var(--color-muted-foreground)">--border-element · --border-divider · --border-section · radius: 0 always</div>
</div></body></html>
