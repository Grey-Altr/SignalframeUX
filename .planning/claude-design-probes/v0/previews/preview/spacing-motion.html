<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:10px">MOTION · DECISIVE · NO BOUNCE</div>
  <table style="width:100%;border-collapse:collapse;font-family:var(--font-sans);font-size:12px">
    <tr><td class="mono" style="font-size:10px;color:var(--color-muted-foreground);padding:4px 0;width:180px">--duration-instant</td><td class="mono" style="font-size:12px">34ms</td><td style="font-size:11px">CSS-only swaps</td></tr>
    <tr><td class="mono" style="font-size:10px;color:var(--color-muted-foreground);padding:4px 0">--duration-fast</td><td class="mono" style="font-size:12px">100ms</td><td style="font-size:11px">Hover-in, press</td></tr>
    <tr><td class="mono" style="font-size:10px;color:var(--color-muted-foreground);padding:4px 0">--duration-normal</td><td class="mono" style="font-size:12px">200ms</td><td style="font-size:11px">Default transitions</td></tr>
    <tr><td class="mono" style="font-size:10px;color:var(--color-muted-foreground);padding:4px 0">--duration-slow</td><td class="mono" style="font-size:12px">400ms</td><td style="font-size:11px">Hover-out, reveals</td></tr>
    <tr><td class="mono" style="font-size:10px;color:var(--color-muted-foreground);padding:4px 0">--duration-glacial</td><td class="mono" style="font-size:12px">600ms</td><td style="font-size:11px">Theme toggle, drama</td></tr>
  </table>
  <hr class="hr-element">
  <div class="mono" style="font-size:10px;color:var(--color-muted-foreground)">--ease-default: cubic-bezier(0.2, 0, 0, 1) — ease-out, everywhere.</div>
</div></body></html>
