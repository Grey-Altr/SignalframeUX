<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>SF Portfolio — Culture Division</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    body { margin: 0; min-height: 100vh; }
    .dark body, body.dark { background: oklch(0.145 0 0); color: oklch(0.985 0 0); }
    #root { min-height: 100vh; }
    input[type="range"] { -webkit-appearance: none; background: oklch(0.3 0 0); height: 2px; }
    a:hover { opacity: 0.7; }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../_shared/sf_primitives.jsx"></script>
  <script type="text/babel" src="Portfolio.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [theme, setTheme] = useState("dark");
      const [hue, setHue] = useState(350);
      const [intensity, setIntensity] = useState(0.55);
      const [seed, setSeed] = useState("7F1A");
      useEffect(() => {
        document.body.className = theme === "dark" ? "dark" : "";
        document.documentElement.style.setProperty("--sfx-theme-hue", hue);
      }, [theme, hue]);
      return (
        <div style={{ minHeight: "100vh" }}>
          <TopNav theme={theme} onToggle={() => setTheme(t => t === "dark" ? "light" : "dark")}/>
          <HeroFrame hue={hue} seed={seed}/>
          <ProjectIndex hue={hue}/>
          <SignalPanel hue={hue} intensity={intensity} onIntensity={setIntensity} seed={seed} onSeed={setSeed}/>
          <Footer hue={hue} seed={seed}/>
          <div style={{ position: "fixed", right: 16, bottom: 16, padding: 12, border: "2px solid currentColor", background: "var(--color-background)", zIndex: 10000, fontFamily: "var(--font-mono)" }}>
            <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 6 }}>HUE</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[350, 200, 98, 145, 25, 270].map(h => (
                <button key={h} onClick={() => setHue(h)} title={`hue ${h}`} style={{ width: 20, height: 20, background: `oklch(0.65 0.3 ${h})`, border: hue === h ? "2px solid currentColor" : "2px solid transparent", cursor: "pointer", padding: 0 }}/>
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
