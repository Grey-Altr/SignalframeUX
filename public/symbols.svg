<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<!-- Technical / Industrial -->
<symbol id="crosshair" viewBox="0 0 24 24"><path d="M12 2v8M12 14v8M2 12h8M14 12h8" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="4" height="4" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="circuit-node" viewBox="0 0 24 24"><rect x="8" y="8" width="8" height="8" fill="currentColor"/><path d="M12 2v6M12 16v6M2 12h6M16 12h6" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="signal-wave" viewBox="0 0 24 24"><path d="M2 12h4l2-6 4 12 4-12 2 6h4" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="data-burst" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07" fill="none" stroke="currentColor" stroke-width="1"/></symbol>
<symbol id="grid-cell" viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="2" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="13" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="13" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="frequency-bar" viewBox="0 0 24 24"><rect x="2" y="14" width="3" height="8" fill="currentColor"/><rect x="7" y="8" width="3" height="14" fill="currentColor"/><rect x="12" y="4" width="3" height="18" fill="currentColor"/><rect x="17" y="10" width="3" height="12" fill="currentColor"/></symbol>
<!-- Navigation -->
<symbol id="arrow-right" viewBox="0 0 24 24"><path d="M4 12h16M14 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="arrow-down" viewBox="0 0 24 24"><path d="M12 4v16M6 14l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="chevron" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="caret" viewBox="0 0 24 24"><path d="M8 10l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<!-- Status -->
<symbol id="dot" viewBox="0 0 24 24"><rect x="9" y="9" width="6" height="6" fill="currentColor"/></symbol>
<symbol id="ring" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="pulse" viewBox="0 0 24 24"><rect x="9" y="9" width="6" height="6" fill="currentColor"/><rect x="4" y="4" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1"/></symbol>
<symbol id="diamond" viewBox="0 0 24 24"><path d="M12 2l10 10-10 10L2 12z" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<!-- Dividers -->
<symbol id="line-h" viewBox="0 0 24 24"><path d="M2 12h20" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="line-v" viewBox="0 0 24 24"><path d="M12 2v20" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="dash" viewBox="0 0 24 24"><path d="M2 12h4M10 12h4M18 12h4" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="zigzag" viewBox="0 0 24 24"><path d="M2 16l4-8 4 8 4-8 4 8 4-8" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<!-- Abstract -->
<symbol id="hex" viewBox="0 0 24 24"><path d="M12 2l9 5v10l-9 5-9-5V7z" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="triangle" viewBox="0 0 24 24"><path d="M12 3l10 18H2z" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="square" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="plus" viewBox="0 0 24 24"><path d="M12 4v16M4 12h16" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="minus" viewBox="0 0 24 24"><path d="M4 12h16" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
<symbol id="asterisk" viewBox="0 0 24 24"><path d="M12 2v20M3.5 7l17 10M20.5 7l-17 10" fill="none" stroke="currentColor" stroke-width="1.5"/></symbol>
