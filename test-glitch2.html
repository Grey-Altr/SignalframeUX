<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: #fff; font-family: monospace; padding: 50px; }
  .nav {
    width: 800px; height: 60px; border: 2px solid #fff; background: #000;
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    font-size: 20px; font-weight: bold;
    position: relative;
    transition: filter 0.1s;
  }
  .nav:hover {
    filter: url(#datamosh);
  }
</style>
</head>
<body>
  <div class="nav">
    <span>SF//UX</span>
    <span>INVENTORY API SYSTEM</span>
    <span>[CMD+K] [DARK] [12:34:56]</span>
  </div>

  <svg width="0" height="0" style="position:absolute; width:0; height:0;">
    <filter id="datamosh" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Horizontal noise bands -->
      <feTurbulence type="fractalNoise" baseFrequency="0.0001 0.15" numOctaves="1" result="noise" />
      <!-- Increase contrast to make sharp bands -->
      <feComponentTransfer in="noise" result="banded">
        <feFuncG type="step" amplitude="1" offset="0.5" />
        <feFuncA type="identity" />
      </feComponentTransfer>
      <!-- Displace Y -->
      <feDisplacementMap in="SourceGraphic" in2="banded" scale="15" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
</body>
</html>
